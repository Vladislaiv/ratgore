  entities:
  - uid: 1444
    components:
    - type: Transform
      pos: 0.5536933,-0.5458118
      parent: 1
    - type: Paper
      content: >-
        From: Battalion Engineering Section


        Comrade Commander,


        Since the loss of our station we have received no supplies, and we have been travelling for a considerable time. I understand that your expectation of me is to keep this vessel operational. However, without resupply for much longer, I fear the ship will eventually lose its ability to function if we do not reach our new home soon.


        My intention is not to damage morale. The engineering team is already working tirelessly to keep the ship together, and I am doing my best to maintain their spirits. This information remains strictly between you and me. I have not informed them of the situation. To keep morale high, I continue to assure them that everything is under control.


        Everything for the Cause.
  - uid: 2174
