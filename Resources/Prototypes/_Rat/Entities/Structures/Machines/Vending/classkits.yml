- type: entity
  parent: ColMarTechBase
  id: ColMarTechEquipmentNCWL
  name: автоматическая стойка снаряжения коммунаров
  description: Автоматизированный стеллаж, соединенный с колоссальным хранилищем стандартного снаряжения лиги.
  components:
  - type: AccessReader
    access:
    - [ "NCWLGeneral" ]
  - type: Sprite
    sprite: _Crescent/Structures/syndicatearmory.rsi
  - type: CMAutomatedVendor
    jobs:
    - PartisanNCWL
    sections:
    - name: Классовый набор
      choices: { CMClass: 1 }
      entries:
      - id: CMVendorBundleRiflemanApparelNCWL
        name: базовый набор ЛРНП
        recommended: true
    - name: Броня
      choices: { CMArmour: 1 }
      entries:
      - id: ClothingOuterHardsuitNCWLInfantry
        name: скафандр ЛРНП
        recommended: true    
      - id: ClothingOuterArmorNCWLHeavyCarapace
        name: бронежилет ЛРНП
    - name: Утилиты
      choices: { CMUtilities: 2 }
      entries:
      - id: EmpGrenade
        name: ЭМИ Граната
      - id: BreachingCharge
        name: Прорывной заряд
      - id: HandHeldMassScannerEE
        name: портативный сканер масс
        recommended: true   
    - name: Боеприпасы
      choices: { CMAmmo: 2 }
      entries:
      - id: MagazinePistolSubMachineGun
        name: 35-зарядный магазин для пистолета-пулемета (9x19 мм PSTF auto)
      - id: MagazineLightRifle
        name: 30-зарядный магазин (5,56x45 мм)
      - id: MagazineShotgun
        name: 10-зарядный магазин (12 калибр)

