- type: vessel
  id: Phantom
  name: NAP Phantom
  description: |
    A sleek American ultra-light strike shuttle, built for fast hit-and-run operations. The Phantom is perfect for flanking attacks.
    LOADOUT: 2x 20mm
    MINIMUM CREW: 1x Pilot
  price: 20000
  category: Small
  group: None
  path: /Maps/_Crescent/Shuttles/NAP/phantom.yml

- type: gameMap
  id: Phantom
  mapName: 'NAP Phantom'
  mapPath: /Maps/_Crescent/Shuttles/NAP/phantom.yml
  minPlayers: 0
  stations:
    Phantom:
      stationProto: StandardCrescentExpeditionVessel
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: ultralight
        - type: StationNameSetup
          mapNameTemplate: 'NAP Phantom {1}'
          nameGenerator:
           !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-expeditions
        - type: VesselDescription
          description: Pirate hunter Ultra Light.