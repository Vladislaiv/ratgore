- type: vessel
  id: Harrier
  name: IPM Harrier
  description: Top of the line heavy fighter built for IPM by SAW.
  price: 30000
  category: Medium
  group: None
  path: /Maps/_Crescent/Shuttles/NCSP/harrier.yml

- type: gameMap
  id: Harrier
  mapName: 'IPM Harrier'
  mapPath: /Maps/_Crescent/Shuttles/NCSP/harrier.yml
  minPlayers: 0
  stations:
    Harrier:
      stationProto: StandardCrescentVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: fighter
        - type: StationNameSetup
          mapNameTemplate: 'IPM Harrier {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-medical
