- type: job
  id: HighsecSHI
  name: job-name-highsec
  description: job-description-highsec
  playTimeTracker: JobHighsecSHI
  ranks:
    RatRankSHICorpSecHigh:
    - !type:CharacterPlaytimeRequirement
      tracker: JobHighsecSHI
      min: 144000 # 40 hours
    RatRankSHICorpSecLead:
    - !type:CharacterPlaytimeRequirement
      tracker: JobHighsecSHI
      min: 108000 # 30 hours
    RatRankSHICorpSecSenior:
    - !type:CharacterPlaytimeRequirement
      tracker: JobHighsecSHI
      min: 72000 # 20 hours
    RatRankSHICorpSecMiddle:
    - !type:CharacterPlaytimeRequirement
      tracker: JobHighsecSHI
      min: 36000 # 10 hours
