  weight: 4
  startingGear: HighsecGear
  alwaysUseSpawner: true
  requireAdminNotify: false
  icon: "JobIconHighsec"
  supervisors: job-supervisors-shi
  canBeAntag: false
  requirements:
    #- !type:CharacterWhitelistRequirement
    - !type:CharacterOverallTimeRequirement
      min: 35000
    - !type:FactionRequirement
      factionID: "SHI"
    - !type:CharacterTraitRequirement
      inverted: true
      traits:
        - Muted
        - Blindness
        - Pacifist
        - WheelchairBound
  special:
  - !type:AddComponentSpecial
    components:
      - type: HullrotFaction
        faction: SHI
      - type: LanguageAdder
        addSpoken:
          - Kaishago
        addUnderstood:
          - Kaishago
  access:
  - Command
  - Maintenance
  - Shinohara
  - ShinoharaSecurity
  - ShinoharaOfficer
  - Service
  - External
  - Mercenary # Frontier
  - Captain # Frontier

