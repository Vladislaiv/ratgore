- type: entity
  parent: ClothingUniformBase
  id: ClothingUniformJumpsuitImperialCombat
  name: Imperial Combat Uniform
  description: A sleek black bodysuit, that conforms to your body. Designed to be used in any environment, and chaff heavily to keep the masses in line.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/Empire/Uniform/mandatecombat.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/Empire/Uniform/mandatecombat.rsi
  - type: ReverseEngineering # Sector Crescent
    recipes:
      - ClothingUniformJumpsuitImperialCombat
      - ClothingUniformJumpsuitClarizeCombat

