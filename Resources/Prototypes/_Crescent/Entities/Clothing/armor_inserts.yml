    maxItemSize: Normal
    grid:
    - 0,0,3,3
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        showEnts: False
        occludes: True
        ents: []
      toggleable-clothing: !type:Container
        showEnts: False
        occludes: True
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
