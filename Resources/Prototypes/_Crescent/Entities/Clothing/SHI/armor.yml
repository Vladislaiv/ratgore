  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: DegradeableArmor
    armorMaxHealth: 750
    armorType: Metallic
    armorRepair: PlasteelPlate
    initialModifiers:
      flatReductions:
        Blunt: 10
        Slash: 10
        Heat: 10
        Caustic: 15
        Radiation: 45
