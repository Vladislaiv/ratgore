- type: entity
  parent: [ClothingOuterHardsuitBase, StreeCredRedeemable, ClothingArmorInsertHardsuit]
  id: ClothingOuterHardsuitHighsec
  name: Shinohara Corporation SVBT-2 Combat Operations Hardsuit
  description: A high quality hardsuit and carrier system, developed for internal use by Shinohara high risk security, as well as loss prevention teams. While this model was never designed for export usage, the Taypani branch of Shinohara has seen hard times, and this restriction is slowly being phased out.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/SHI/OuterClothing/corpsec.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/SHI/OuterClothing/corpsec.rsi
  - type: ExtendDescription
    descriptionList:
      - description: This is a carrier vest, it will only provide mediocre protection on its own. Put an armor insert into it to fully utilize it.
        fontSize: 15
        color: "#ff2106"
        requireDetailRange: true
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: DegradeableArmor
    armorMaxHealth: 900
    armorType: Ceramic
    armorRepair: NTCeramic
    initialModifiers:
      flatReductions:
        Heat: 15
        Caustic: 15
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitCorpsec
  - type: ClothingAddFaction
    faction: SHI
  - type: ReverseEngineering # SectorCrescent
    difficulty: 3
    recipes:
      - ClothingOuterHardsuitHighsec
      - ClothingOuterHardsuitHighsecUA
      - ClothingOuterHardsuitHighsecIndependent
      - ClothingOuterHardsuitHEV

