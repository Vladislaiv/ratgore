
- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHelmetNCWLBasic
  name: 2B5 Combat Helmet
  description: The standard issue, low cut, combat helmet employed by the Union. Comes with flared sides to fit your communication equipment, and ample padding for comfort. For best results, apply to head.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/NCWL/Head/ncwlhelmet.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/NCWL/Head/ncwlhelmet.rsi
  - type: ReverseEngineering # SectorCrescent
    recipes:
      - ClothingHeadHelmetNCWLBasic
      - ClothingOuterArmorNCWLLightBodyarmor

- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHelmetNCWLHeavy
  name: 2B8 Heavy Combat Helmet
  description: An incredibly heavy helmet, constructed entirely out of solid plasteel, rather than ballistic fibre. The faceplate is rated to stop smaller rifle rounds. Commonly worn by juggernauts, but is only issued on request.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/NCWL/Head/ncwlheavyhelmet.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/NCWL/Head/ncwlheavyhelmet.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
        Heat: 0.85
        Caustic: 0.85
  - type: ReverseEngineering # SectorCrescent
    recipes:
      - ClothingHeadHelmetNCWLHeavy
      - ClothingHeadHelmetNCWLRiot
      - ClothingOuterArmorNCWLHeavyCarapace
      - ClothingHeadHelmetNCWLBasic
      - ClothingOuterArmorNCWLLightBodyarmor

- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHelmetNCWLRiot
  name: 2B5P Riot Helmet
  description: A variation of the standard 2B5 helmet, with the brim removed, and a plastic face visor added. The helmet retains most of its protective ability, but the visor will really only protect you from a brick. 
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/NCWL/Head/ncwlhelmetriot.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/NCWL/Head/ncwlhelmetriot.rsi
  - type: DegradeableArmor
    armorMaxHealth: 1000
    armorType: Metallic
    armorRepair: SteelPlate
    initialModifiers:
      flatReductions:
        Blunt: 5
        Slash: 5
        Piercing: 5
        Heat: 5
        Caustic: 5
  - type: ReverseEngineering # SectorCrescent
    recipes:
      - ClothingHeadHelmetNCWLRiot
      - ClothingHeadHelmetNCWLHeavy
      - ClothingOuterArmorNCWLHeavyCarapace
      - ClothingHeadHelmetNCWLBasic
      - ClothingOuterArmorNCWLLightBodyarmor

