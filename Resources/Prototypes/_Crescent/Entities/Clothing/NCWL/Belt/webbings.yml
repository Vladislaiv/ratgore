  id: ClothingBeltNCWLWebbing
  name: 1W5 Webbing Gear
  description: A generic set of suspenders, combined with a belt, and adorned with all kinds of pouches. Carries all your magazines and other gear.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/NCWL/Belt/ncwl_webbing.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/NCWL/Belt/ncwl_webbing.rsi
  - type: ExplosionResistance
