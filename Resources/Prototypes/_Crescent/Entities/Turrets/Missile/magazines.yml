- type: entity
  id: Magazine60mm
  name: 60mm loading box
  description: A munitions drum designed to ease loading of 60mm rocket systems. Comes 6 rockets to a box.
  parent: Magazine48mmRocket
  components:
    - type: BallisticAmmoProvider
      whitelist:
        tags:
          - CartridgeAzimuth
      proto: Cartridge60mmRocket

