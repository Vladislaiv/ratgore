  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CrescentCartridge_185Ga
    proto: CrescentCartridge_185Ga
    capacity: 5
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Magazine/18.5Ga_Mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
