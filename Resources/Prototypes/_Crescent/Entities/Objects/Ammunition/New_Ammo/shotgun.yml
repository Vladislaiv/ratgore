# 18.5Ga

- type: entity
  id: CrescentCartridge_185Ga
  name: Cartridge (18.5Ga)
  parent: CrescentBaseCartridge
  abstract: False
  components:
  - type: Tag
    tags:
    - ShellShotgun
    - Cartridge
    - CrescentCartridge_185Ga
  - type: CartridgeAmmo
    proto: CrescentBullet_185Ga
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Casings/18.5Ga.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]

- type: entity
  id: CrescentBullet_185Ga
  name: bullet (18.5Ga)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 1000 # i just hit the juckport
    harmorPenetration: 30
    stoppingPower: 4

- type: entity
  id: Crescent185gaPelletShotgunSpread
  categories: [ HideSpawnMenu ]
  parent: CrescentBullet_185Ga
  components:
  - type: ProjectileSpread
    proto: CrescentBullet_185Ga
    count: 5
    spread: 12.5

- type: entity
  abstract: False
  parent: CrescentBaseAmmoBox
  id: CrescentAmmoBox_185Ga
  name: ammunition box (18.5Ga)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CrescentCartridge_185Ga
    proto: CrescentCartridge_185Ga
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Boxes/Shotgun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false

- type: entity
  id: CrescentMagazine_185Ga
  name: "10-round magazine (18.5Ga)"
