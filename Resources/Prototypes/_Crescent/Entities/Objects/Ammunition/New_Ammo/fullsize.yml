# 7.62x54

- type: entity
  id: CrescentCartridge_762x54
  name: Cartridge (7.62x54mm)
  parent: CrescentBaseCartridge
  abstract: False
  components:
  - type: Tag
    tags:
    - Cartridge
    - CrescentCartridge_762x54
  - type: CartridgeAmmo
    proto: CrescentBullet_762x54
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Casings/7.62x54.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]

- type: entity
  id: CrescentBullet_762x54
  name: bullet (7.62x54mm)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 1000 # i just hit the juckport
    harmorPenetration: 30
    stoppingPower: 4

- type: entity
  abstract: False
  parent: CrescentBaseAmmoBox
  id: CrescentAmmoBox_762x54
  name: ammunition box (7.62x54mm)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CrescentCartridge_762x54
    proto: CrescentCartridge_762x54
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Boxes/Fullsize.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 7
    zeroVisible: false

