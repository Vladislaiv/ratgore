# 5.56
- type: entity
  id: CrescentCartridge_556x45
  name: Cartridge (5.56x45mm)
  parent: CrescentBaseCartridge
  abstract: False
  components:
  - type: Tag
    tags:
    - Cartridge
    - CrescentCartridge_556x45
  - type: CartridgeAmmo
    proto: CrescentBullet_556x45
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Casings/5.56x45.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]


- type: entity
  id: CrescentBullet_556x45
  name: bullet (5.56x45mm)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 1000 # i just hit the juckport
    harmorPenetration: 30
    stoppingPower: 4


- type: entity
  abstract: False
  parent: CrescentBaseAmmoBox
  id: CrescentAmmoBox_556x45
  name: ammunition box (5.56x45mm)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge
        - CrescentCartridge_556x45
    proto: CrescentCartridge_556x45
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Boxes/Intermediary.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 7
    zeroVisible: false


