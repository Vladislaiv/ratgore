# .50 AE

- type: entity
  id: CrescentCartridge_.50
  name: Cartridge (.50 AE)
  parent: CrescentBaseCartridge
  abstract: False
  components:
  - type: Tag
    tags:
    - Cartridge
    - CrescentCartridge_.50
  - type: CartridgeAmmo
    proto: CrescentBullet_.50
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Casings/.50.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]

- type: entity
  id: CrescentBullet_.50
  name: bullet (.50 AE)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 1000 # i just hit the juckport
    harmorPenetration: 30
    stoppingPower: 4

- type: entity
  abstract: False
  parent: CrescentBaseAmmoBox
  id: CrescentAmmoBox_.50
  name: ammunition box (.50 AE)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CrescentCartridge_.50
    proto: CrescentCartridge_.50
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Boxes/Magnum.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false

- type: entity
  id: CrescentMagazine_.50
  name: "7-round magazine (.50 AE)"
  parent: CrescentBaseMagazine
  abstract: False
  components:
  - type: Tag
    tags:
      - Magazine_.50
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CrescentCartridge_.50
    proto: CrescentCartridge_.50
    capacity: 7
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Magazine/.50_PstlMag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false

