# 7.62x25

- type: entity
  id: CrescentCartridge_762x25
  name: Cartridge (7.62x25)
  parent: CrescentBaseCartridge
  abstract: False
  components:
  - type: Tag
    tags:
    - Cartridge
    - CrescentCartridge_762x25
  - type: CartridgeAmmo
    proto: CrescentBullet_762x25
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Casings/7.62x25.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]

- type: entity
  id: CrescentBullet_762x25
  name: bullet (7.62x25)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 1000 # i just hit the juckport
    harmorPenetration: 30
    stoppingPower: 4

- type: entity
  abstract: False
  parent: CrescentBaseAmmoBox
  id: CrescentAmmoBox_762x25
  name: ammunition box (7.62x25)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge
        - CrescentCartridge_762x25
    proto: CrescentCartridge_762x25
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Boxes/Pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false

- type: entity
  id: CrescentMagazine_762x25
  name: "7-round magazine (7.62x25)"
  parent: CrescentBaseMagazine
  abstract: False
  components:
  - type: Tag
    tags:
      - CrescentMagazine_762x25
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge
        - CrescentCartridge_762x25
    proto: CrescentCartridge_762x25
    capacity: 7
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Magazine/7.62x25_PstlMag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false

- type: entity
  id: CrescentSMGMagazine_762x25
  name: "30-round magazine (7.62x25)"
  parent: CrescentBaseMagazine
  abstract: False
  components:
  - type: Tag
    tags:
      - CrescentSMGMagazine_762x25
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge
        - CrescentCartridge_762x25
    proto: CrescentCartridge_762x25
    capacity: 30
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Magazine/7.62x25_SMGMag.rsi
