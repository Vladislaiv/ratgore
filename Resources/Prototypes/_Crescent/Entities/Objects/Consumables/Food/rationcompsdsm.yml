#Trash
- type: entity
  categories: [ HideSpawnMenu ]
  parent: FoodPacketTrash
  id: RationCompMainTrash
  name: Empty Ration Main Component
  components:
  - type: Sprite
    sprite: _Crescent/Objects/Consumables/Food/ration.rsi
    state: dsmrationcompmainopen
  - type: Item

- type: entity
  categories: [ HideSpawnMenu ]
  parent: FoodPacketTrash
  id: RationCompSideTrash
  name: Empty Ration Side Component
  components:
  - type: Sprite
    sprite: _Crescent/Objects/Consumables/Food/ration.rsi
    state: dsmrationcompsideopen
  - type: Item