#All of the MRE components that can spawn in the DSM Ration Packs. 
#Bases
- type: entity
  parent: FoodBase
  id: RationComponentBaseMain
  abstract: true
  components:
  - type: Food
  - type: Sprite
    sprite: _Crescent/Objects/Consumables/Food/ration.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Nutriment
          Quantity: 40
  - type: Item
    sprite: _Crescent/Objects/Consumables/Food/ration.rsi
    size: Small
    
- type: entity
  parent: FoodBase
  id: RationComponentBaseSide
  abstract: true
  components:
  - type: Food
  - type: Sprite
    sprite: _Crescent/Objects/Consumables/Food/ration.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Nutriment
          Quantity: 20
  - type: Item
    sprite: _Crescent/Objects/Consumables/Food/ration.rsi
    size: Small
#Mains    
- type: entity
  name: Ration Component (Menu 1, Soy Patty, Beef Flavored)
  parent: RationComponentBaseMain
  id: RationComponentMainSoyBeef
  description: A squishy rectangular "patty", made out of soy protein, and cheaply altered to taste like beef. 
  components:
    - type: FlavorProfile
      flavors:
        - bitter
        - falsemeat
    - type: Sprite
      state: dsmrationcompmainclosed
    - type: Item
    - type: Food
      trash:
      - RationCompMainTrash

- type: entity
  name: Ration Component (Menu 2, BBQ Mothroach Filet)
  parent: RationComponentBaseMain
  id: RationComponentMainMothroach
  description: A grainy chunk of horribly overcooked mothroach meat, drenched in a generous amount of BBQ sauce flavored sludge. Is the fancy clothing really worth it?
  components:
    - type: FlavorProfile
      flavors:
        - metallic
        - sweet
        - meaty
    - type: Sprite
      state: dsmrationcompmainclosed
    - type: Item
    - type: Food
      trash:
      - RationCompMainTrash

- type: entity
  name: Ration Component (Menu 3, Rice Pilaf)
  parent: RationComponentBaseMain
  id: RationComponentMainPilaf
  description: A gelatinous brick, supposedly made of rice. You're pretty sure pilaf is supposed to be savory, but this just tastes like wallpaper paste.
  components:
    - type: FlavorProfile
      flavors:
        - bitter
        - nutriment
    - type: Sprite
      state: dsmrationcompmainclosed
    - type: Item
    - type: Food
      trash:
      - RationCompMainTrash

- type: entity
  name: Ration Component (Menu 4, Stewed Tofu)
  parent: RationComponentBaseMain
  id: RationComponentMainTofu
  description: A thick goopy soup, filled with small cubes of tofu. The broth tastes like pure salt, and the tofu is completely raw.
  components:
    - type: FlavorProfile
      flavors:
        - salty
        - slimy
    - type: Sprite
      state: dsmrationcompmainclosed
    - type: Item
    - type: Food
      trash:
      - RationCompMainTrash

- type: entity
  name: Ration Component (Menu 5, Cilbir)
  parent: RationComponentBaseMain
  id: RationComponentMainEggs
  description: A thick glob of reconstituted egg, in a bath of strong garlicky yogurt. Tastes okay if you eat it with your eyes closed.
  components:
    - type: FlavorProfile
      flavors:
        - oily
        - chalky
        - garlic
    - type: Sprite
      state: dsmrationcompmainclosed
    - type: Item
    - type: Food
      trash:
      - RationCompMainTrash
      
- type: entity
  name: Ration Component (Menu 6, Beans in Savory Sauce)
  parent: RationComponentBaseMain
  id: RationComponentMainBeans
  description: A shitload of kidney beans in a savory sauce, with the consistency of olive oil. Don't eat this one before long trips.
  components:
    - type: FlavorProfile
      flavors:
        - savory
        - chalky
        - salty
    - type: Sprite
      state: dsmrationcompmainclosed
    - type: Item
    - type: Food
      trash:
      - RationCompMainTrash
